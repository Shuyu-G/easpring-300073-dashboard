name: Deploy Dashboard To GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "15 1 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh ETL and models
        run: python -m src.easpring_pipeline --project-root .

      - name: Build static snapshot
        run: python -m src.dashboard_snapshot --project-root . --output site/index.html

      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Copy metrics for inspection
        run: cp reports/metrics.json site/metrics.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify_failure:
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '[Bot] Dashboard refresh failed';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              '自动更新失败了。',
              '',
              `- 时间: ${new Date().toISOString()}`,
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              '',
              '请打开 run 日志查看是哪一步失败。',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

  close_failure_alert:
    if: ${{ success() }}
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Close open failure issue if present
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '[Bot] Dashboard refresh failed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `自动更新已恢复成功。最近一次成功 run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }
