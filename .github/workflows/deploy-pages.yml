name: Deploy Dashboard To GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "15 1 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh ETL and models
        run: python -m src.easpring_pipeline --project-root .

      - name: Build static snapshot
        run: python -m src.dashboard_snapshot --project-root . --output site/index.html

      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Copy metrics for inspection
        run: cp reports/metrics.json site/metrics.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

